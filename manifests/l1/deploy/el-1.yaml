apiVersion: apps/v1
kind: Deployment
metadata:
  name: el-1
  labels:
    app.kubernetes.io/name: el-1
    app.kubernetes.io/part-of: decker-l1
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: el-1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: el-1
        app.kubernetes.io/part-of: decker-l1
    spec:
      containers:
        - name: el-1
          image: 'ghcr.io/paradigmxyz/reth:v1.9.3'
          command:
            - /usr/local/bin/reth
          args:
            - node
            - '--chain'
            - /artifacts/genesis.json
            - '--datadir'
            - /data_reth
            - '--color'
            - never
            - '--addr'
            - 0.0.0.0
            - '--port'
            - '30303'
            - '--ipcpath'
            - /data_reth/reth.ipc
            - '--http'
            - '--http.addr'
            - 0.0.0.0
            - '--http.api'
            - 'admin,eth,web3,net,rpc,mev,flashbots'
            - '--http.port'
            - '8545'
            - '--authrpc.port'
            - '8551'
            - '--authrpc.addr'
            - 0.0.0.0
            - '--authrpc.jwtsecret'
            - /artifacts/jwtsecret
            - '--metrics'
            - '0.0.0.0:9090'
            - '--engine.persistence-threshold'
            - '0'
            - '--engine.memory-block-buffer-target'
            - '0'
            - '-vvv'
            - '--disable-discovery'
          ports:
            - name: rpc
              containerPort: 8545
            - name: authrpc
              containerPort: 8551
            - name: metrics
              containerPort: 9090
          volumeMounts:
            - name: artifacts
              mountPath: /artifacts
              readOnly: true
            - name: data
              mountPath: /data_reth
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: decker-artifacts
            readOnly: true
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: el-1
  labels:
    app.kubernetes.io/name: el-1
    app.kubernetes.io/part-of: decker-l1
spec:
  selector:
    app.kubernetes.io/name: el-1
  ports:
    - name: rpc
      port: 8545
      targetPort: rpc
    - name: authrpc
      port: 8551
      targetPort: authrpc
    - name: metrics
      port: 9090
      targetPort: metrics
