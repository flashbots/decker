apiVersion: apps/v1
kind: Deployment
metadata:
  name: validator-1
  labels:
    app.kubernetes.io/name: validator-1
    app.kubernetes.io/part-of: decker-l1
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: validator-1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: validator-1
        app.kubernetes.io/part-of: decker-l1
    spec:
      initContainers:
        - name: load-keystores
          image: 'busybox:1.36'
          command:
            - sh
            - '-c'
            - cp -a /src/data_validator/. /data_validator/
          volumeMounts:
            - name: artifacts
              mountPath: /src
              readOnly: true
            - name: data
              mountPath: /data_validator
      containers:
        - name: validator-1
          image: 'docker.io/sigp/lighthouse:v8.1.0'
          command:
            - lighthouse
          args:
            - vc
            - '--datadir'
            - /data_validator
            - '--testnet-dir'
            - /artifacts/testnet
            - '--init-slashing-protection'
            - '--beacon-nodes'
            - 'http://beacon-1:3500'
            - '--suggested-fee-recipient'
            - '0x690B9A9E9aa1C9dB991C7721a92d351Db4FaC990'
            - '--builder-proposals'
            - '--prefer-builder-proposals'
          volumeMounts:
            - name: artifacts
              mountPath: /artifacts
              readOnly: true
            - name: data
              mountPath: /data_validator
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: decker-artifacts
            readOnly: true
        - name: data
          emptyDir: {}
