apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  labels:
    app.kubernetes.io/name: hello
    app.kubernetes.io/part-of: decker-l1
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hello
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hello
        app.kubernetes.io/part-of: decker-l1
    spec:
      containers:
        - name: hello
          image: 'busybox:1.36'
          command:
            - sh
            - '-c'
          args:
            - 'echo ''hello, world'' && sleep 3600'
          volumeMounts: []
      volumes: []
