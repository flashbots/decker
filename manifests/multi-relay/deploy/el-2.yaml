apiVersion: v1
kind: ConfigMap
metadata:
  name: rbuilder-2-config
  labels:
    app.kubernetes.io/part-of: decker-l1
data:
  rbuilder.toml: |
    log_json = false
    log_level = "info,rbuilder=debug"
    redacted_telemetry_server_port = 8846
    redacted_telemetry_server_ip = "0.0.0.0"
    full_telemetry_server_port = 8847
    full_telemetry_server_ip = "0.0.0.0"

    chain = "/artifacts/genesis.json"
    reth_datadir = "/data_reth"
    el_node_ipc_path = "/data_reth/reth.ipc"

    # First prefunded account (0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266)
    coinbase_secret_key = "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
    relay_secret_key = "0x25295f0d1d592a90b333e26e85149708208e9f8e8bc18f6c77bd62f8ad7a6866"

    cl_node_url = ["http://beacon-2:23500"]
    genesis_fork_version = "0x20000089"
    jsonrpc_server_port = 8845
    jsonrpc_server_ip = "0.0.0.0"
    extra_data = "rbuilder-2 ⚡"

    ignore_cancellable_orders = true
    root_hash_use_sparse_trie = true
    root_hash_compare_sparse_trie = false
    slot_delta_to_start_bidding_ms = -20000
    live_builders = ["mp-ordering"]
    enabled_relays = ["mev-boost-relay-1"]

    [[relays]]
    name = "mev-boost-relay-1"
    url = "http://mev-boost-relay-1:9062"
    use_ssz_for_submit = false
    use_gzip_for_submit = false
    mode = "full"

    [[builders]]
    name = "mp-ordering"
    algo = "ordering-builder"
    discard_txs = true
    sorting = "max-profit"
    failed_order_retries = 1
    drop_failed_orders = true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: el-2
  labels:
    app.kubernetes.io/name: el-2
    app.kubernetes.io/part-of: decker-l1
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: el-2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: el-2
        app.kubernetes.io/part-of: decker-l1
    spec:
      shareProcessNamespace: true
      containers:
        - name: el-2
          image: 'ghcr.io/paradigmxyz/reth:v1.9.3'
          command:
            - /usr/local/bin/reth
          args:
            - node
            - '--chain'
            - /artifacts/genesis.json
            - '--datadir'
            - /data_reth
            - '--color'
            - never
            - '--addr'
            - 0.0.0.0
            - '--port'
            - '30303'
            - '--ipcpath'
            - /data_reth/reth.ipc
            - '--http'
            - '--http.addr'
            - 0.0.0.0
            - '--http.api'
            - 'admin,eth,web3,net,rpc,mev,flashbots'
            - '--http.port'
            - '18545'
            - '--authrpc.port'
            - '28551'
            - '--authrpc.addr'
            - 0.0.0.0
            - '--authrpc.jwtsecret'
            - /artifacts/jwtsecret
            - '--metrics'
            - '0.0.0.0:19090'
            - '--engine.persistence-threshold'
            - '0'
            - '--engine.memory-block-buffer-target'
            - '0'
            - '-vvv'
            - '--disable-discovery'
          ports:
            - name: rpc
              containerPort: 18545
            - name: authrpc
              containerPort: 28551
            - name: metrics
              containerPort: 19090
          volumeMounts:
            - name: artifacts
              mountPath: /artifacts
              readOnly: true
            - name: data
              mountPath: /data_reth
        - name: rbuilder-2
          image: 'ghcr.io/flashbots/rbuilder:sha-0f2ea0c'
          args:
            - run
            - /config/rbuilder.toml
          ports:
            - name: http
              containerPort: 8845
              protocol: TCP
          volumeMounts:
            - name: artifacts
              mountPath: /artifacts
              readOnly: true
            - name: data
              mountPath: /data_reth
            - name: rbuilder-2-config
              mountPath: /config/rbuilder.toml
              subPath: rbuilder.toml
              readOnly: true
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: decker-artifacts
            readOnly: true
        - name: data
          emptyDir: {}
        - name: rbuilder-2-config
          configMap:
            name: rbuilder-2-config
---
apiVersion: v1
kind: Service
metadata:
  name: el-2
  labels:
    app.kubernetes.io/name: el-2
    app.kubernetes.io/part-of: decker-l1
spec:
  selector:
    app.kubernetes.io/name: el-2
  ports:
    - name: rpc
      port: 18545
      targetPort: rpc
    - name: authrpc
      port: 28551
      targetPort: authrpc
    - name: metrics
      port: 19090
      targetPort: metrics
