apiVersion: apps/v1
kind: Deployment
metadata:
  name: beacon-2
  labels:
    app.kubernetes.io/name: beacon-2
    app.kubernetes.io/part-of: decker-l1
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: beacon-2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beacon-2
        app.kubernetes.io/part-of: decker-l1
    spec:
      containers:
        - name: beacon-2
          image: 'docker.io/sigp/lighthouse:v8.1.0'
          command:
            - lighthouse
          args:
            - bn
            - '--datadir'
            - /data_beacon
            - '--testnet-dir'
            - /artifacts/testnet
            - '--enable-private-discovery'
            - '--disable-peer-scoring'
            - '--staking'
            - '--enr-address'
            - 127.0.0.1
            - '--enr-udp-port'
            - '29000'
            - '--enr-tcp-port'
            - '29000'
            - '--enr-quic-port'
            - '29100'
            - '--port'
            - '29000'
            - '--quic-port'
            - '29100'
            - '--http'
            - '--http-port'
            - '23500'
            - '--http-address'
            - 0.0.0.0
            - '--http-allow-origin'
            - '*'
            - '--disable-packet-filter'
            - '--target-peers'
            - '5'
            - '--execution-endpoint'
            - 'http://el-2:28551'
            - '--execution-jwt'
            - /artifacts/jwtsecret
            - '--always-prepare-payload'
            - '--prepare-payload-lookahead'
            - '8000'
            - '--suggested-fee-recipient'
            - '0x690B9A9E9aa1C9dB991C7721a92d351Db4FaC990'
            - '--libp2p-addresses'
            - /dns4/beacon-1/tcp/9000
          ports:
            - name: http
              containerPort: 23500
            - name: p2p-tcp
              containerPort: 29000
              protocol: TCP
            - name: p2p-udp
              containerPort: 29000
              protocol: UDP
            - name: quic
              containerPort: 29100
              protocol: UDP
          volumeMounts:
            - name: artifacts
              mountPath: /artifacts
              readOnly: true
            - name: data
              mountPath: /data_beacon
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: decker-artifacts
            readOnly: true
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: beacon-2
  labels:
    app.kubernetes.io/name: beacon-2
    app.kubernetes.io/part-of: decker-l1
spec:
  selector:
    app.kubernetes.io/name: beacon-2
  ports:
    - name: http
      port: 23500
      targetPort: http
