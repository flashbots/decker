name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: decker-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: decker-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: decker-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: decker-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: latest
      - name: Stamp version
        if: github.ref_type == 'tag'
        run: echo "export const VERSION = \"${GITHUB_REF_NAME#v}\";" > utils/version.ts
      - name: Compile
        run: make compile OUTPUT=${{ matrix.name }} TARGET=${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
